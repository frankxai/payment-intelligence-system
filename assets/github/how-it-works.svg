  <rect x="28" y="28" width="1224" height="664" rx="32" fill="none" stroke="rgba(255,255,255,0.18)"/>
  <text x="56" y="82" font-size="15" font-weight="900" fill="#fb7185" letter-spacing="3">L5 / HOW THIS REPO WORKS</text>
  <text x="56" y="152" font-size="54" font-weight="900" fill="#f8fafc" opacity="1"><tspan x="56" dy="0">Payment Intelligence System</tspan></text>
  <text x="58" y="236" font-size="22" font-weight="650" fill="#d7e2f3" opacity="1"><tspan x="58" dy="0">Verifies mandates, checks caps, records audit entries, and requires</tspan><tspan x="58" dy="27.5">humans without moving money.</tspan></text>
  <g>
