  </defs>
  <rect width="1280" height="720" fill="#05070d"/>
  <image href="visual-suite/backplates/red-blue-assurance.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice" opacity="0.88"/>
