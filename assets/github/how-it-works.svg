  <line x1="70" y1="360" x2="1188" y2="360" stroke="#fb7185" stroke-width="2" opacity="0.65"/>
  <g>
    <rect x="54" y="390" width="270" height="178" rx="18" fill="rgba(5,8,14,0.74)" stroke="rgba(255,255,255,0.18)"/>
    <rect x="54" y="390" width="5" height="178" rx="2.5" fill="#fb7185"/>
    <text x="76" y="421" font-size="13" font-weight="900" fill="#fb7185">01</text>
    <text x="76" y="451" font-size="21" font-weight="850" fill="#f8fafc" opacity="1"><tspan x="76" dy="0">Verify mandate</tspan></text>
    <text x="76" y="473" font-size="14" font-weight="500" fill="#b6c2d6" opacity="1"><tspan x="76" dy="0">Start from source truth.</tspan></text>
  </g><g>
    <rect x="352" y="390" width="270" height="178" rx="18" fill="rgba(5,8,14,0.74)" stroke="rgba(255,255,255,0.18)"/>
    <rect x="352" y="390" width="5" height="178" rx="2.5" fill="#fb7185"/>
