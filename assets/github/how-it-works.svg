    <text x="970" y="451" font-size="21" font-weight="850" fill="#f8fafc" opacity="1"><tspan x="970" dy="0">Require human</tspan><tspan x="970" dy="22.05">approval</tspan></text>
    <text x="970" y="496" font-size="14" font-weight="500" fill="#b6c2d6" opacity="1"><tspan x="970" dy="0">Escalate risky actions.</tspan></text>
