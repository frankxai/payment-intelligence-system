    <text x="374" y="451" font-size="21" font-weight="850" fill="#f8fafc" opacity="1"><tspan x="374" dy="0">Check spend cap</tspan></text>
    <text x="374" y="473" font-size="14" font-weight="500" fill="#b6c2d6" opacity="1"><tspan x="374" dy="0">Create the artifact.</tspan></text>
  </g><g>
    <rect x="650" y="390" width="270" height="178" rx="18" fill="rgba(5,8,14,0.74)" stroke="rgba(255,255,255,0.18)"/>
    <rect x="650" y="390" width="5" height="178" rx="2.5" fill="#fb7185"/>
    <text x="672" y="421" font-size="13" font-weight="900" fill="#fb7185">03</text>
    <text x="672" y="451" font-size="21" font-weight="850" fill="#f8fafc" opacity="1"><tspan x="672" dy="0">Record audit</tspan></text>
    <text x="672" y="473" font-size="14" font-weight="500" fill="#b6c2d6" opacity="1"><tspan x="672" dy="0">Keep evidence attached.</tspan></text>
  </g><g>
    <rect x="948" y="390" width="270" height="178" rx="18" fill="rgba(5,8,14,0.74)" stroke="rgba(255,255,255,0.18)"/>
    <rect x="948" y="390" width="5" height="178" rx="2.5" fill="#fb7185"/>
