name: Payments MCP CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Install
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
